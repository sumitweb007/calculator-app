<!DOCTYPE html>
<html>
<head>
  <title>Pro Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: radial-gradient(circle at top, #1a0000, #000000 70%);
      color: white;
      text-align: center;
    }

    .container {
      width: 360px;
      margin: 50px auto;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      height: 60px;
      font-size: 24px;
      margin-bottom: 15px;
      text-align: right;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 10px;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .operators {
      display: grid;
      gap: 10px;
    }

    .memory {
      grid-column: span 2;
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      height: 60px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .operator { background: #ff4d4d; }
    .equal { background: #00cc66; }
    .clear { background: #666; }

    .history {
      margin-top: 20px;
      max-height: 120px;
      overflow-y: auto;
      text-align: left;
      font-size: 14px;
    }

    .currency {
      margin-top: 20px;
    }

    select, .currency input {
      width: 45%;
      padding: 5px;
      margin: 5px;
    }

    /* glow background */
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,0,0,0.1), transparent 70%);
      animation: moveBg 10s linear infinite;
      z-index: -1;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      50% { transform: translate(10%,10%); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Calculator</h2>

  <input type="text" id="display" readonly>

  <div class="buttons">

    <!-- Memory -->
    <div class="memory">
      <button onclick="memoryClear()">MC</button>
      <button onclick="memoryRecall()">MR</button>
      <button onclick="memoryAdd()">M+</button>
      <button onclick="clearDisplay()" class="clear">C</button>
    </div>

    <!-- Numbers -->
    <div class="numbers">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button onclick="calculate()" class="equal">=</button>
    </div>

    <!-- Operators -->
    <div class="operators">
      <button onclick="append('/')" class="operator">÷</button>
      <button onclick="append('*')" class="operator">×</button>
      <button onclick="append('-')" class="operator">−</button>
      <button onclick="append('+')" class="operator">+</button>
    </div>

  </div>

  <div class="history" id="history"></div>

  <!-- Currency -->
  <div class="currency">
    <h3>Currency Converter</h3>

    <input type="number" id="amount" placeholder="Amount">

    <br>

    <select id="from">
      <option value="INR">INR</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CNY">CNY</option>
      <option value="RUB">RUB</option>
      <option value="CAD">CAD</option>
      <option value="NZD">NZD</option>
      <option value="EUR">EUR</option>
    </select>

    <select id="to">
      <option value="USD">USD</option>
      <option value="INR">INR</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CNY">CNY</option>
      <option value="RUB">RUB</option>
      <option value="CAD">CAD</option>
      <option value="NZD">NZD</option>
      <option value="EUR">EUR</option>
    </select>

    <br>

    <button onclick="convert()">Convert</button>

    <p id="result"></p>
  </div>

</div>

<script>
let display = document.getElementById("display");
let historyDiv = document.getElementById("history");
let memory = 0;

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    let result = Function("return " + display.value)();
    historyDiv.innerHTML += display.value + " = " + result + "<br>";
    display.value = result;
  } catch {
    display.value = "Error";
  }
}

/* Memory */
function memoryAdd() {
  memory += Number(display.value || 0);
}

function memoryRecall() {
  display.value = memory;
}

function memoryClear() {
  memory = 0;
}

/* Keyboard */
document.addEventListener("keydown", function(e) {
  if (!isNaN(e.key) || "+-*/.".includes(e.key)) append(e.key);
  else if (e.key === "Enter") calculate();
  else if (e.key === "Backspace") display.value = display.value.slice(0, -1);
  else if (e.key === "Escape") clearDisplay();
});

/* Live Currency */
async function convert() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount) return;

  try {
    let res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
    let data = await res.json();

    let result = amount * data.rates[to];

    document.getElementById("result").innerText =
      amount + " " + from + " = " + result.toFixed(2) + " " + to;

  } catch {
    document.getElementById("result").innerText = "Error";
  }
}
</script>

</body>
</html>
