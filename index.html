<!DOCTYPE html>
<html>
<head>
  <title>Advanced Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .container {
      width: 300px;
      margin: 50px auto;
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      height: 50px;
      font-size: 20px;
      margin-bottom: 10px;
      text-align: right;
      padding: 5px;
    }

    button {
      width: 23%;
      height: 50px;
      margin: 1%;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .operator { background: #ff4d4d; }
    .equal { background: #00cc66; }
    .clear { background: #666; }

    .history {
      margin-top: 20px;
      text-align: left;
      max-height: 100px;
      overflow-y: auto;
      font-size: 14px;
    }

    .currency {
      margin-top: 20px;
    }

    select, .currency input {
      width: 45%;
      padding: 5px;
      margin: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Calculator</h2>

  <input type="text" id="display" disabled>

  <!-- Buttons -->
  <div>
    <button onclick="clearDisplay()" class="clear">C</button>
    <button onclick="memoryClear()">MC</button>
    <button onclick="memoryRecall()">MR</button>
    <button onclick="memoryAdd()">M+</button>
  </div>

  <div>
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('/')" class="operator">÷</button>
  </div>

  <div>
    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('*')" class="operator">×</button>
  </div>

  <div>
    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('-')" class="operator">−</button>
  </div>

  <div>
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
    <button onclick="append('+')" class="operator">+</button>
  </div>

  <!-- History -->
  <div class="history" id="history"></div>

  <!-- Currency Converter -->
  <div class="currency">
    <h3>Currency Converter</h3>

    <input type="number" id="amount" placeholder="Amount">

    <br>

    <select id="from">
      <option value="INR">INR</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CNY">CNY</option>
      <option value="RUB">RUB</option>
      <option value="CAD">CAD</option>
      <option value="NZD">NZD</option>
      <option value="EUR">EUR</option>
    </select>

    <select id="to">
      <option value="USD">USD</option>
      <option value="INR">INR</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CNY">CNY</option>
      <option value="RUB">RUB</option>
      <option value="CAD">CAD</option>
      <option value="NZD">NZD</option>
      <option value="EUR">EUR</option>
    </select>

    <br>

    <button onclick="convert()">Convert</button>

    <p id="result"></p>
  </div>

</div>

<script>
let display = document.getElementById("display");
let historyDiv = document.getElementById("history");
let memory = 0;

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    let result = eval(display.value);
    historyDiv.innerHTML += display.value + " = " + result + "<br>";
    display.value = result;
  } catch {
    display.value = "Error";
  }
}

/* MEMORY */
function memoryAdd() {
  memory += Number(display.value || 0);
}

function memoryRecall() {
  display.value = memory;
}

function memoryClear() {
  memory = 0;
}

/* CURRENCY (STATIC RATES) */
const rates = {
  INR: 1,
  USD: 0.012,
  GBP: 0.0095,
  AUD: 0.018,
  CNY: 0.086,
  RUB: 1.1,
  CAD: 0.016
};

async function convert() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount) {
    document.getElementById("result").innerText = "Enter amount";
    return;
  }

  try {
    let response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
    let data = await response.json();

    let rate = data.rates[to];
    let result = amount * rate;

    document.getElementById("result").innerText =
      amount + " " + from + " = " + result.toFixed(2) + " " + to;

  } catch (error) {
    document.getElementById("result").innerText = "Error fetching rates";
  }
}
</script>

</body>
</html>
