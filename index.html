<!DOCTYPE html>
<html>
<head>
  <title>Advanced Calculator</title>
  <style>
   body {
  font-family: Arial;
  background: radial-gradient(circle at top, #1a0000, #000000 70%);
  color: white;
  text-align: center;
}
body::before {
  content: "";
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,0,0,0.1), transparent 70%);
  animation: moveBg 10s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(10%,10%); }
  100% { transform: translate(0,0); }
}
   .container {
  width: 320px;
  margin: 50px auto;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}
    input {
      width: 100%;
      height: 50px;
      font-size: 20px;
      margin-bottom: 10px;
      text-align: right;
      padding: 5px;
    }

    button {
      width: 23%;
      height: 50px;
      margin: 1%;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .operator { background: #ff4d4d; }
    .equal { background: #00cc66; }
    .clear { background: #666; }

    .history {
      margin-top: 20px;
      text-align: left;
      max-height: 100px;
      overflow-y: auto;
      font-size: 14px;
    }

    .currency {
      margin-top: 20px;
    }

    select, .currency input {
      width: 45%;
      padding: 5px;
      margin: 5px;
    }
    .buttons {
  display: grid;
  grid-template-columns: 3fr 1fr;
  gap: 10px;
}

.memory {
  grid-column: span 2;
  display: flex;
  gap: 5px;
}

.numbers {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.operators {
  display: grid;
  gap: 5px;
}
  </style>
</head>

<body>

<div class="container">
  <h2>Calculator</h2>

  <input type="text" id="display" disabled>

  <!-- Buttons -->
  <div class="buttons">

  <!-- Memory -->
  <div class="memory">
    <button onclick="memoryClear()">MC</button>
    <button onclick="memoryRecall()">MR</button>
    <button onclick="memoryAdd()">M+</button>
    <button onclick="clearDisplay()" class="clear">C</button>
  </div>

  <!-- Numbers -->
  <div class="numbers">
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
  </div>

  <!-- Operators -->
  <div class="operators">
    <button onclick="append('/')" class="operator">÷</button>
    <button onclick="append('*')" class="operator">×</button>
    <button onclick="append('-')" class="operator">−</button>
    <button onclick="append('+')" class="operator">+</button>
  </div>

</div>

  <div>
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
    <button onclick="append('+')" class="operator">+</button>
  </div>

  <!-- History -->
  <div class="history" id="history"></div>

  <!-- Currency Converter -->
  <div class="currency">
    <h3>Currency Converter</h3>

    <input type="number" id="amount" placeholder="Amount">

    <br>

    <select id="from">
      <option value="INR">INR</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CNY">CNY</option>
      <option value="RUB">RUB</option>
      <option value="CAD">CAD</option>
      <option value="NZD">NZD</option>
      <option value="EUR">EUR</option>
    </select>

    <select id="to">
      <option value="USD">USD</option>
      <option value="INR">INR</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CNY">CNY</option>
      <option value="RUB">RUB</option>
      <option value="CAD">CAD</option>
      <option value="NZD">NZD</option>
      <option value="EUR">EUR</option>
    </select>

    <br>

    <button onclick="convert()">Convert</button>

    <p id="result"></p>
  </div>

</div>

<script>
let display = document.getElementById("display");
let historyDiv = document.getElementById("history");
let memory = 0;

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    let result = eval(display.value);
    historyDiv.innerHTML += display.value + " = " + result + "<br>";
    display.value = result;
  } catch {
    display.value = "Error";
  }
}

/* MEMORY */
function memoryAdd() {
  memory += Number(display.value || 0);
}

function memoryRecall() {
  display.value = memory;
}

function memoryClear() {
  memory = 0;
}

/* CURRENCY (STATIC RATES) */
const rates = {
  INR: 1,
  USD: 0.012,
  GBP: 0.0095,
  AUD: 0.018,
  CNY: 0.086,
  RUB: 1.1,
  CAD: 0.016
};

async function convert() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount) {
    document.getElementById("result").innerText = "Enter amount";
    return;
  }

  try {
    let response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
    let data = await response.json();

    let rate = data.rates[to];
    let result = amount * rate;

    document.getElementById("result").innerText =
      amount + " " + from + " = " + result.toFixed(2) + " " + to;

  } catch (error) {
    document.getElementById("result").innerText = "Error fetching rates";
  }
}
  document.addEventListener("keydown", function(event) {
  const key = event.key;

  if (!isNaN(key) || "+-*/.".includes(key)) {
    append(key);
  } else if (key === "Enter") {
    calculate();
  } else if (key === "Backspace") {
    display.value = display.value.slice(0, -1);
  } else if (key === "Escape") {
    clearDisplay();
  }
});
</script>

</body>
</html>
